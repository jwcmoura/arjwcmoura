<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebAR – Marcador JC</title>

  <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 999; display: flex; flex-direction: column;
      align-items: center; pointer-events: none;
    }
    #status-bar {
      width: 100%; background: rgba(0,0,0,.65);
      backdrop-filter: blur(8px); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    #dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f59e0b; flex-shrink: 0; transition: background .4s;
    }
    #dot.found   { background: #22c55e; }
    #dot.playing { background: #3b82f6; animation: pulse 1.2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    #status-text { color: #fff; font-size: 13px; letter-spacing: .3px; }
    #hint {
      margin-top: 8px; background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.15); border-radius: 20px;
      padding: 6px 16px; color: rgba(255,255,255,.7); font-size: 12px;
    }

    #video-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.92); flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #video-overlay.active { display: flex; }

    #yt-frame {
      width: min(560px, 96vw); aspect-ratio: 16/9;
      border-radius: 12px; border: none;
      box-shadow: 0 0 60px rgba(59,130,246,.4);
    }
    #close-btn {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.25);
      color: #fff; font-size: 14px; padding: 10px 28px;
      border-radius: 999px; cursor: pointer; pointer-events: all;
      transition: background .2s;
    }
    #close-btn:hover { background: rgba(255,255,255,.2); }

    #open-btn {
      display: none; position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%); z-index: 998;
      background: #3b82f6; color: #fff; font-size: 16px; font-weight: 600;
      padding: 14px 36px; border-radius: 999px; border: none; cursor: pointer;
      box-shadow: 0 4px 30px rgba(59,130,246,.5);
      animation: bounce .8s ease infinite alternate; pointer-events: all;
    }
    #open-btn.visible { display: block; }
    @keyframes bounce {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(-6px); }
    }

    #loading {
      position: fixed; inset: 0; z-index: 997;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(0,0,0,.7); pointer-events: none;
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.2);
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #fff; font-size: 13px; opacity: .7; }
  </style>
</head>
<body>

  <div id="hud">
    <div id="status-bar">
      <div id="dot"></div>
      <span id="status-text">Carregando marcador NFT…</span>
    </div>
    <div id="hint">Aponte para o marcador JC</div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando detector de imagem…</p>
  </div>

  <button id="open-btn" onclick="openVideo()">▶ Assistir vídeo</button>

  <div id="video-overlay">
    <iframe
      id="yt-frame"
      src=""
      allow="autoplay; fullscreen"
      allowfullscreen
    ></iframe>
    <button id="close-btn" onclick="closeVideo()">✕ Fechar</button>
  </div>

  <a-scene
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
    vr-mode-ui="enabled: false"
  >
    <a-entity camera></a-entity>

    <a-nft
      type="nft"
      url="./marcador"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
      id="marker"
      emitevents="true"
    >
      <a-plane color="#ffffff" opacity="0.01" width="1" height="1" rotation="-90 0 0"></a-plane>
    </a-nft>

  </a-scene>

  <script>
    const YT_URL = 'https://www.youtube.com/embed/wbllUy8h97M?autoplay=1&rel=0';

    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const openBtn    = document.getElementById('open-btn');
    const overlay    = document.getElementById('video-overlay');
    const ytFrame    = document.getElementById('yt-frame');
    const loading    = document.getElementById('loading');

    let markerVisible = false;

    document.querySelector('a-scene').addEventListener('loaded', () => {
      loading.classList.add('hidden');
      statusText.textContent = 'Câmera pronta – aponte para o marcador JC';
    });

    document.getElementById('marker').addEventListener('markerFound', () => {
      markerVisible = true;
      dot.className = 'found';
      statusText.textContent = 'Marcador encontrado!';
      openBtn.classList.add('visible');
    });

    document.getElementById('marker').addEventListener('markerLost', () => {
      markerVisible = false;
      dot.className = '';
      statusText.textContent = 'Procurando marcador…';
      openBtn.classList.remove('visible');
    });

    function openVideo() {
      ytFrame.src = YT_URL;
      overlay.classList.add('active');
      dot.className = 'playing';
      statusText.textContent = 'Reproduzindo vídeo…';
    }

    function closeVideo() {
      ytFrame.src = '';
      overlay.classList.remove('active');
      dot.className = markerVisible ? 'found' : '';
      statusText.textContent = markerVisible ? 'Marcador encontrado!' : 'Procurando marcador…';
    }
  </script>
</body>
</html>
