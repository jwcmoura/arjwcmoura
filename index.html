<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebAR – Marcador JC</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; flex-direction: column; align-items: center; pointer-events: none;
    }
    #status-bar {
      width: 100%; background: rgba(0,0,0,.45);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 10px 16px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; transition: background .4s; }
    #dot.found   { background: #22c55e; }
    #dot.playing { background: #3b82f6; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #status-text { color: rgba(255,255,255,.85); font-size: 12px; font-weight: 500; }

    /* Botões flutuantes */
    #ar-buttons {
      display: none; position: fixed; bottom: 48px; left: 50%;
      transform: translateX(-50%); z-index: 998;
      gap: 16px; align-items: center; justify-content: center; pointer-events: all;
    }
    #ar-buttons.visible { display: flex; }

    .ar-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      text-decoration: none; pointer-events: all;
      animation: popIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    .ar-btn:nth-child(1) { animation-delay: 0s; }
    .ar-btn:nth-child(2) { animation-delay: .08s; }
    .ar-btn:nth-child(3) { animation-delay: .16s; }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(24px) scale(.7); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .ar-btn-circle {
      width: 58px; height: 58px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(20px) saturate(200%);
      -webkit-backdrop-filter: blur(20px) saturate(200%);
      border: 1px solid rgba(255,255,255,.25);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3), inset 0 -1px 0 rgba(0,0,0,.2), 0 8px 32px rgba(0,0,0,.4);
      transition: transform .15s;
    }
    .ar-btn-circle:active { transform: scale(.92); }
    .ar-btn-label { color: #fff; font-size: 11px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,.8); letter-spacing: .3px; }
    #btn-whatsapp  .ar-btn-circle { background: linear-gradient(135deg, rgba(37,211,102,.65), rgba(18,140,67,.55)); }
    #btn-instagram .ar-btn-circle { background: linear-gradient(135deg, rgba(193,53,132,.6), rgba(131,58,180,.55)); }
    #btn-google    .ar-btn-circle { background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1)); }

    /* Loading */
    #loading {
      position: fixed; inset: 0; z-index: 997;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
      background: rgba(0,0,0,.85);
    }
    #loading.hidden { display: none; }
    .spinner { width: 38px; height: 38px; border: 2.5px solid rgba(255,255,255,.15); border-top-color: #3b82f6; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: rgba(255,255,255,.65); font-size: 13px; }

    /* Aviso Instagram */
    #browser-warn {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.96); flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; padding: 32px; text-align: center;
    }
  </style>
</head>
<body>

  <!-- Aviso Instagram -->
  <div id="browser-warn">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="12" fill="#f59e0b"/>
      <path d="M12 7v5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="12" cy="16.5" r="1.2" fill="#fff"/>
    </svg>
    <p style="color:#fff;font-size:19px;font-weight:700;line-height:1.3;">Abra no Chrome<br>para usar a câmera</p>
    <p style="color:rgba(255,255,255,.65);font-size:14px;line-height:1.7;">
      Toque nos <strong style="color:#fff">3 pontinhos ⋮</strong><br>
      e escolha <strong style="color:#fff">"Abrir no navegador"</strong>
    </p>
    <div style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:16px;padding:14px 20px;width:100%;max-width:300px;">
      <p style="color:rgba(255,255,255,.45);font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">ou copie o link</p>
      <p style="color:#60a5fa;font-size:13px;word-break:break-all;font-weight:600;">jwcmoura.github.io/arjwcmoura/</p>
    </div>
    <button onclick="document.getElementById('browser-warn').style.display='none'"
      style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.5);font-size:12px;padding:10px 24px;border-radius:999px;cursor:pointer;">
      Continuar mesmo assim
    </button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="status-bar">
      <div id="dot"></div>
      <span id="status-text">Carregando…</span>
    </div>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Iniciando câmera…</p>
  </div>

  <!-- Botões flutuantes -->
  <div id="ar-buttons">
    <a id="btn-whatsapp" class="ar-btn" href="https://wa.me/5583998908488" target="_blank">
      <div class="ar-btn-circle">
        <svg width="26" height="26" viewBox="0 0 32 32" fill="#fff">
          <path d="M16 0C7.164 0 0 7.163 0 16c0 2.825.738 5.484 2.027 7.795L0 32l8.412-2.004A15.93 15.93 0 0 0 16 32c8.836 0 16-7.163 16-16S24.836 0 16 0zm0 29.538a13.51 13.51 0 0 1-6.88-1.883l-.493-.292-5.197 1.238 1.265-4.999-.32-.512A13.472 13.472 0 0 1 2.462 16C2.462 8.517 8.517 2.462 16 2.462S29.538 8.517 29.538 16 23.483 29.538 16 29.538zm7.406-10.116c-.406-.203-2.4-1.184-2.772-1.32-.372-.135-.643-.203-.913.203-.271.406-1.048 1.32-1.285 1.59-.237.271-.474.304-.88.101-.406-.203-1.714-.632-3.263-2.015-1.206-1.076-2.02-2.405-2.257-2.811-.237-.406-.025-.625.178-.827.183-.181.406-.474.61-.711.203-.237.27-.406.406-.677.135-.271.068-.508-.034-.711-.101-.203-.913-2.203-1.251-3.016-.33-.791-.664-.684-.913-.696l-.778-.013c-.271 0-.711.101-1.083.508-.372.406-1.42 1.387-1.42 3.382s1.454 3.923 1.657 4.194c.203.271 2.862 4.372 6.933 6.131.969.418 1.724.668 2.313.856.972.309 1.857.265 2.557.161.78-.116 2.4-.981 2.738-1.928.338-.947.338-1.76.237-1.928-.101-.169-.372-.271-.778-.474z"/>
        </svg>
      </div>
      <span class="ar-btn-label">WhatsApp</span>
    </a>
    <a id="btn-instagram" class="ar-btn" href="https://www.instagram.com/jwcmoura" target="_blank">
      <div class="ar-btn-circle">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
        </svg>
      </div>
      <span class="ar-btn-label">Instagram</span>
    </a>
    <a id="btn-google" class="ar-btn" href="https://g.page/r/CfUqCIDpc4KVEBM/review" target="_blank">
      <div class="ar-btn-circle">
        <svg width="26" height="26" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </div>
      <span class="ar-btn-label">Avaliar</span>
    </a>
  </div>

  <!-- Cena AR -->
  <a-scene
    mindar-image="imageTargetSrc: ./marcador.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="character" src="./walkingV2.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Luz ambiente -->
    <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="1 2 1"></a-light>

    <a-entity mindar-image-target="targetIndex: 0" id="marker">

      <!-- Boneco 3D andando em círculo em volta do marcador -->
      <a-entity id="walker-pivot" position="0 0 0">
        <a-entity
          id="walker"
          gltf-model="#character"
          scale="0.4 0.4 0.4"
          position="0.6 0 0"
          rotation="0 90 0"
          animation-mixer="clip: *; loop: repeat; timeScale: 1;"
        ></a-entity>
      </a-entity>

    </a-entity>
  </a-scene>

  <script>
    // Detecta Instagram/Facebook
    const ua = navigator.userAgent || '';
    if (/Instagram|FBAN|FBAV|FB_IAB/i.test(ua)) {
      document.getElementById('browser-warn').style.display = 'flex';
    }

    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const loading    = document.getElementById('loading');
    const arButtons  = document.getElementById('ar-buttons');
    const pivot      = document.getElementById('walker-pivot');

    let angle = 0;
    let walking = false;
    let rafId = null;

    // Animação de rotação em volta do marcador
    function animateWalk() {
      angle += 0.5; // velocidade de caminhada
      if (angle >= 360) angle = 0;
      pivot.setAttribute('rotation', { x: 0, y: angle, z: 0 });
      rafId = requestAnimationFrame(animateWalk);
    }

    document.querySelector('a-scene').addEventListener('loaded', () => {
      loading.classList.add('hidden');
      statusText.textContent = 'Aponte para o marcador JC';
    });

    const marker = document.getElementById('marker');

    marker.addEventListener('targetFound', () => {
      dot.className = 'found';
      statusText.textContent = 'Marcador encontrado!';
      arButtons.classList.add('visible');
      // Reinicia animação dos botões
      document.querySelectorAll('.ar-btn').forEach(btn => {
        btn.style.animation = 'none';
        btn.offsetHeight;
        btn.style.animation = '';
      });
      // Inicia rotação
      if (!walking) {
        walking = true;
        animateWalk();
      }
    });

    marker.addEventListener('targetLost', () => {
      dot.className = '';
      statusText.textContent = 'Aponte para o marcador JC';
      arButtons.classList.remove('visible');
      // Para rotação
      walking = false;
      if (rafId) cancelAnimationFrame(rafId);
    });
  </script>
</body>
</html>
