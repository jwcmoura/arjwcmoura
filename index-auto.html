<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebAR – Marcador JC</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; flex-direction: column; align-items: center; pointer-events: none;
    }
    #status-bar {
      width: 100%; background: rgba(0,0,0,.7);
      backdrop-filter: blur(8px); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
    }
    #dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f59e0b; flex-shrink: 0; transition: background .4s;
    }
    #dot.found   { background: #22c55e; }
    #dot.playing { background: #3b82f6; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #status-text { color: #fff; font-size: 13px; }
    #hint {
      margin-top: 8px; background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.15); border-radius: 20px;
      padding: 6px 16px; color: rgba(255,255,255,.7); font-size: 12px;
    }

    #video-overlay {
      display: none; position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,.92); flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #video-overlay.active { display: flex; }
    #yt-frame {
      width: min(560px, 96vw); aspect-ratio: 16/9;
      border-radius: 12px; border: none;
      box-shadow: 0 0 60px rgba(59,130,246,.4);
    }
    #close-btn {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.25);
      color: #fff; font-size: 14px; padding: 10px 28px;
      border-radius: 999px; cursor: pointer; pointer-events: all;
    }

    #open-btn {
      display: none; position: fixed; bottom: 40px; left: 50%;
      transform: translateX(-50%); z-index: 998;
      background: #3b82f6; color: #fff; font-size: 16px; font-weight: 600;
      padding: 14px 36px; border-radius: 999px; border: none; cursor: pointer;
      box-shadow: 0 4px 30px rgba(59,130,246,.5);
      animation: bounce .8s ease infinite alternate; pointer-events: all;
    }
    #open-btn.visible { display: block; }
    @keyframes bounce {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(-6px); }
    }

    #loading {
      position: fixed; inset: 0; z-index: 997;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: rgba(0,0,0,.8);
    }
    #loading.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,.2);
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #fff; font-size: 13px; opacity: .8; }
  </style>
</head>
<body>

  <div id="hud">
    <div id="status-bar">
      <div id="dot"></div>
      <span id="status-text">Carregando…</span>
    </div>
    <div id="hint">Aponte para a logo</div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Iniciando câmera…</p>
  </div>

  <button id="open-btn" onclick="openVideo()">▶ Assistir vídeo</button>

  <div id="video-overlay">
    <iframe id="yt-frame" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
    <button id="close-btn" onclick="closeVideo()">✕ Fechar</button>
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ./marcador.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets></a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0" id="marker">
      <a-plane color="#3b82f6" opacity="0.01" width="1" height="1" position="0 0 0" rotation="0 0 0"></a-plane>
    </a-entity>
  </a-scene>

  <script>
    const YT_URL = 'https://www.youtube.com/embed/wbllUy8h97M?autoplay=1&rel=0';
    const dot        = document.getElementById('dot');
    const statusText = document.getElementById('status-text');
    const openBtn    = document.getElementById('open-btn');
    const overlay    = document.getElementById('video-overlay');
    const ytFrame    = document.getElementById('yt-frame');
    const loading    = document.getElementById('loading');
    let markerVisible = false;

    const sceneEl = document.querySelector('a-scene');
    sceneEl.addEventListener('loaded', () => {
      loading.classList.add('hidden');
      statusText.textContent = 'Câmera pronta – aponte para a logo';
    });

    const marker = document.getElementById('marker');
    marker.addEventListener('targetFound', () => {
      markerVisible = true;
      dot.className = 'found';
      statusText.textContent = 'Marcador encontrado!';
      openVideo();
    });
    marker.addEventListener('targetLost', () => {
      markerVisible = false;
      dot.className = '';
      statusText.textContent = 'Procurando marcador…';
      closeVideo();
    });

    function openVideo() {
      ytFrame.src = YT_URL;
      overlay.classList.add('active');
      dot.className = 'playing';
      statusText.textContent = 'Reproduzindo vídeo…';
    }
    function closeVideo() {
      ytFrame.src = '';
      overlay.classList.remove('active');
      dot.className = markerVisible ? 'found' : '';
      statusText.textContent = markerVisible ? 'Marcador encontrado!' : 'Procurando marcador…';
    }
  </script>
</body>
</html>
